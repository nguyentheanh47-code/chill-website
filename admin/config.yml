backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "vi"

collections:
  - name: "blog"
    label: "Bài viết (Blog / Tips)"
    label_singular: "Bài viết"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Chuyên mục", name: "category", widget: "select", options: ["Livestream Tips", "Checklist", "Mentor Notes", "Employer Branding", "Case Study", "Văn hóa Chill"] }
      - { label: "Ngày đăng", name: "date", widget: "datetime", format: "YYYY-MM-DD", default: "" }
      - { label: "Mô tả ngắn (hiện ở trang danh sách)", name: "excerpt", widget: "text" }
      - { label: "Ảnh bìa", name: "cover", widget: "image", required: false }
      - { label: "Nội dung bài viết", name: "body", widget: "markdown" }
